name: Bump Version

on:
  pull_request:
    types: [closed]
    branches: [master, main]

permissions:
  contents: write

jobs:
  delete-merged-branch:
    name: Delete merged branch
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Delete PR branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = `heads/${context.payload.pull_request.head.ref}`;

            try {
              await github.rest.git.deleteRef({ owner, repo, ref });
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
            }

  bump-version:
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}

    steps:
      - name: Determine bump part
        id: bump
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          if   [[ "$branch" == major/* ]]; then echo "part=major" >> "$GITHUB_OUTPUT"
          elif [[ "$branch" == minor/* ]]; then echo "part=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$branch" == patch/* ]]; then echo "part=patch" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Branch '$branch' must start with major/, minor/, or patch/"
            exit 1
          fi

      - name: Check out base branch
        if: steps.bump.outputs.part != ''
        uses: actions/checkout@v4
        with:
          # Check out the target branch (master/main), not the PR head
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        if: steps.bump.outputs.part != ''
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install bump-my-version
        if: steps.bump.outputs.part != ''
        run: uv tool install bump-my-version

      - name: Configure git identity
        if: steps.bump.outputs.part != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: steps.bump.outputs.part != ''
        run: bump-my-version bump ${{ steps.bump.outputs.part }}

      - name: Refresh uv lockfile
        if: steps.bump.outputs.part != ''
        run: |
          uv lock
          git add uv.lock
          git commit --amend --no-edit

      - name: Read bumped version
        id: version
        if: steps.bump.outputs.part != ''
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push version commit
        if: steps.bump.outputs.part != ''
        run: git push

  release:
    name: Create GitHub release
    needs: bump-version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out bumped base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.commit }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: uv build --python 3.12

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.bump-version.outputs.version }}
          COMMIT: ${{ needs.bump-version.outputs.commit }}
        run: |
          gh release create "v${VERSION}" dist/* \
            --target "${COMMIT}" \
            --title "v${VERSION}" \
            --generate-notes
