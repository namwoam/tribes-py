name: CI

on:
  push:
    branches: ["master", "main", "project-renovate"]
  pull_request:
    branches: ["master", "main"]

jobs:
  branch-prefix:
    name: Check branch prefix
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Verify version bump branch prefix
        run: |
          branch="${{ github.head_ref }}"
          prefix="${branch%%/*}"

          # Branches without a version bump prefix are allowed; they simply
          # won't trigger an automatic version bump after merge.
          lower_prefix="${prefix,,}"
          if [[ "$lower_prefix" =~ ^(major|minor|patch)$ ]] && [[ "$prefix" != "$lower_prefix" ]]; then
            echo "::error::Branch prefix '$prefix' looks like a version bump type but did not match (case-sensitive). Use lowercase: major/*, minor/*, or patch/*"
            exit 1
          fi

  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Syntax check
        run: |
          uv run python -c "import compileall, sys; sys.exit(0 if compileall.compile_dir('tribes', quiet=True, force=True) else 1)"

      - name: Lint (flake8)
        run: uv run flake8 tribes tests main.py

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run e2e tests
        run: uv run pytest tests/e2e/ -v --tb=short

      - name: Run full test suite with coverage
        run: |
          uv run pytest tests/ \
            --cov=tribes \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false
