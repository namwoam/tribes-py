name: CI

on:
  push:
    branches: ["master", "main", "project-renovate"]
  pull_request:
    branches: ["master", "main"]

jobs:
  branch-prefix:
    name: Check branch prefix
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: check-branch-prefix
        run: |
          branch="${{ github.head_ref }}"

          if [[ ! "$branch" =~ ^(major|minor|patch)/.+$ ]]; then
            echo "::error::Branch '$branch' must start with major/, minor/, or patch/"
            exit 1
          fi

  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: install-uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: set-up-python-${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: install-dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: syntax-check
        run: |
          uv run python -c "import compileall, sys; sys.exit(0 if compileall.compile_dir('tribes', quiet=True, force=True) else 1)"

      - name: lint-flake8
        run: uv run flake8 tribes tests main.py

      - name: run-unit-tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: run-e2e-tests
        run: uv run pytest tests/e2e/ -v --tb=short

      - name: run-full-test-suite-with-coverage
        run: |
          uv run pytest tests/ \
            --cov=tribes \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: upload-coverage-report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false
