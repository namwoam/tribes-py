name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  branch-prefix:
    name: Check branch prefix
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check branch prefix
        run: |
          branch="${{ github.head_ref }}"

          if [[ ! "$branch" =~ ^(major|minor|patch)/.+$ ]]; then
            echo "::error::Branch '$branch' must start with major/, minor/, or patch/"
            exit 1
          fi

  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Syntax check
        run: |
          uv run python -c "import compileall, sys; sys.exit(0 if compileall.compile_dir('tribes', quiet=True, force=True) else 1)"

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run e2e tests
        run: uv run pytest tests/e2e/ -v --tb=short

      - name: Run full test suite with coverage
        run: |
          uv run pytest tests/ \
            --cov=tribes \
            --cov-report=term-missing \
            --cov-report=xml \
            -q
          uv run coverage report --format=markdown > coverage-report.md

      - name: Run sample performance report
        if: matrix.python-version == '3.12'
        run: |
          /usr/bin/time -p -o sample-time.txt \
            uv run python main.py \
              --level levels/sample_level.csv \
              --players random \
              --players random \
              --players random \
              --players random \
              --seed 42 \
              > sample-output.txt

          elapsed="$(awk '/^real / { print $2 }' sample-time.txt)"
          {
            echo "### Performance report"
            echo ""
            echo "| Sample | Seed | Elapsed time |"
            echo "|---|---:|---:|"
            echo "| \`levels/sample_level.csv\` with 4 random agents | \`42\` | \`${elapsed}s\` |"
            echo ""
            echo "<details><summary>Command</summary>"
            echo ""
            echo '```bash'
            echo 'uv run python main.py --level levels/sample_level.csv --players random --players random --players random --players random --seed 42'
            echo '```'
            echo "</details>"
          } > performance-report.md

      - name: Comment CI report
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-report -->';
            const report = fs.readFileSync('coverage-report.md', 'utf8');
            const performanceReport = fs.readFileSync('performance-report.md', 'utf8');
            const coverageLines = report.trim().split('\n');
            const totalIndex = coverageLines.findIndex((line) => line.startsWith('| TOTAL '));
            const coverageSummary = totalIndex === -1
              ? report
              : [
                  coverageLines[0],
                  coverageLines[1],
                  coverageLines[totalIndex],
                  '',
                  '<details><summary>File coverage</summary>',
                  '',
                  report,
                  '',
                  '</details>',
                ].join('\n');
            const body = [
              marker,
              '## CI report',
              '',
              '### Coverage report',
              '',
              coverageSummary,
              '',
              performanceReport,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false
