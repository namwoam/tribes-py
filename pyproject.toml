[project]
name = "tribes-py"
version = "0.1.0"
description = "Python port of Tribes strategy game"
requires-python = ">=3.11"
dependencies = [
    "pygame>=2.6.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tribes"]
