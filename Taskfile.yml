version: '3'

tasks:
  install:
    desc: Install dependencies with uv
    cmds:
      - uv sync --all-extras

  run:
    desc: Run the game
    cmds:
      - uv run python main.py

  test:
    desc: Run all tests
    cmds:
      - uv run pytest tests/ -v --cov=tribes --cov-report=term-missing

  test-unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit/ -v

  test-e2e:
    desc: Run end-to-end tests only
    cmds:
      - uv run pytest tests/e2e/ -v

  lint:
    desc: Check code style
    cmds:
      - uv run pre-commit run --all-files

  tournament:
    desc: Run a tournament
    cmds:
      - uv run python -m tribes.tournament

  train:
    desc: Train with SB3 MaskablePPO (pass CLI_ARGS to forward options)
    cmds:
      - uv run python train.py {{.CLI_ARGS}}

  train-curriculum:
    desc: Train with full curriculum (random→simple→self-play, 2→4 tribes)
    cmds:
      - uv run python train.py --curriculum {{.CLI_ARGS}}

  tensorboard:
    desc: Launch TensorBoard (default logdir runs/tb, override with LOGDIR=...)
    cmds:
      - uv run tensorboard --logdir {{.LOGDIR | default "runs/tb"}}

  clean:
    desc: Clean cache files
    cmds:
      - find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
      - find . -name "*.pyc" -delete 2>/dev/null || true
